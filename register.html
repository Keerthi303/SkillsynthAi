{% extends "base.html" %}
{% block title %}Create Account — Skill Synth AI{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card glass">
        <div class="auth-header">
            <span class="brand__mark" style="width:40px;height:40px;font-size:1.1rem;">◇</span>
            <h1>Create your account</h1>
            <p class="text-muted">Start your AI-powered career analysis</p>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            </div>
            <div id="registerError" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn btn--primary btn--full" id="registerBtn">
                Create account <span class="arrow">→</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login_page') }}">Sign in →</a></p>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const errDiv = document.getElementById('registerError');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';
    errDiv.style.display = 'none';
    try {
        const resp = await fetch('/auth/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = '/dashboard';
        } else {
            errDiv.textContent = data.error || 'Registration failed';
            errDiv.style.display = 'block';
        }
    } catch (err) {
        errDiv.textContent = 'Network error. Please try again.';
        errDiv.style.display = 'block';
    }
    btn.disabled = false;
    btn.innerHTML = 'Create account <span class="arrow">→</span>';
});
</script>
{% endblock %}
