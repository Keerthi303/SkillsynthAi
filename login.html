{% extends "base.html" %}
{% block title %}Sign In — Skill Synth AI{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card glass">
        <div class="auth-header">
            <span class="brand__mark" style="width:40px;height:40px;font-size:1.1rem;">◇</span>
            <h1>Welcome back</h1>
            <p class="text-muted">Sign in to access your career dashboard</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div class="form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>
            <div id="loginError" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn btn--primary btn--full" id="loginBtn">
                Sign in <span class="arrow">→</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register_page') }}">Create one →</a></p>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errDiv = document.getElementById('loginError');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    errDiv.style.display = 'none';
    try {
        const resp = await fetch('/auth/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                remember: document.getElementById('remember').checked
            })
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = '/dashboard';
        } else {
            errDiv.textContent = data.error || 'Login failed';
            errDiv.style.display = 'block';
        }
    } catch (err) {
        errDiv.textContent = 'Network error. Please try again.';
        errDiv.style.display = 'block';
    }
    btn.disabled = false;
    btn.innerHTML = 'Sign in <span class="arrow">→</span>';
});
</script>
{% endblock %}
